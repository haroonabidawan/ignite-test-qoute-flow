<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QuoteFlow Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="QuoteFlow - AI-assisted quotation builder documentation"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --theme-color: #059669;
        --theme-color-dark: #047857;
      }
      .markdown-section {
        max-width: 56rem;
      }
      .swagger-wrap {
        margin-top: 1rem;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        overflow: hidden;
        min-height: 480px;
      }
      .swagger-wrap .swagger-ui .topbar {
        display: none;
      }
      .api-url-form {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
        margin: 1rem 0;
      }
      .api-url-form input {
        flex: 1;
        min-width: 12rem;
        padding: 0.4rem 0.6rem;
        border: 1px solid #d1d5db;
        border-radius: 6px;
      }
      .api-url-form button {
        padding: 0.4rem 0.9rem;
        background: #059669;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "QuoteFlow",
        homepage: "README.md",
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        search: {
          placeholder: "Search docs…",
          noData: "No results",
          depth: 4,
        },
        copyCode: {
          buttonText: "Copy",
          errorText: "Error",
          successText: "Copied",
        },
      };

      window.getQuoteFlowApiUrl = function () {
        return (
          new URLSearchParams(location.search).get("api") ||
          localStorage.getItem("quoteflow_docs_api_url") ||
          "http://localhost:8000"
        ).replace(/\/$/, "");
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  </body>
</html>
